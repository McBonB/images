services:
  webui:
    build: .
    container_name: image-gen-webui
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./main.py:/app/main.py
      - ./static:/app/static
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
    restart: unless-stopped
